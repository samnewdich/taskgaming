  <div id="game-container">


    <div id="table-input">

        <button id="logbtn">Login</button>
      </div>

      <div id="table-input-p2">

        <input type="email" id="email-input" placeholder="Enter your email"> <br/>

        <input type="text" id="name-reg" placeholder="Enter your name"> <br/>

        <p>Password: </p>
        <input type="text" id="pwd-reg" placeholder="Enter your password"> <br/>

    </div>


    <a href="" target="_blank" style="text-decoration: none;"><button id="logout" onclick="logout()">LOG</button></a>
  </div>

  <script src="phaser.js"></script>
  <script src="main.js?v=1.16"></script>
  <script>
    function openLogin(){
      document.getElementById("table-input-p2").style.display="none";
      document.getElementById("table-input-p1").style.display="block";
    }

    function openRegister(){
      document.getElementById("table-input-p2").style.display="block";
      document.getElementById("table-input-p1").style.display="none";
    }



    function logout(){
      localStorage.clear();
      window.location="/bussygame";
    }
  </script>
